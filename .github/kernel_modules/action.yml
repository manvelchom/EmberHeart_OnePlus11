name: Build OnePlus kernel modules (hardcoded)

permissions:
  contents: write
  actions: write

inputs:
  optimize_level:
    required: false
    type: string
    default: O2  # Choices: O2 or O3

runs:
  using: composite
  steps:
    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="OP11R"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        [ -x "$REPO" ] || { curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO" && chmod +x "$REPO"; }
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source (hardcoded)
      shell: bash
      run: |
        set -euo pipefail
        echo "Cloning docdry0001/android_kernel_common_oneplus_sm8475 (branch oneplus/sm8475)"
        git clone --depth=1 --branch oneplus/sm8475 \
          https://github.com/docdry0001/android_kernel_common_oneplus_sm8475.git \
          kernel_platform
        cd kernel_platform
        echo "Kernel source cloned."

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        cd kernel_platform
        ANDROID_VERSION="android12"               # hardcode – կարող եք փոխել
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SOC=waipio" >> "$GITHUB_ENV"        # ձեր սարքի համար

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.19
      with:
        key: OP11R-modules-${{ env.KERNEL_FULL_VER }}
        max-size: 5G
        append-timestamp: false
        create-symlink: true
        job-summary: 'CCache stats'
        evict-old-files: 'job'

    - name: Clone kernel patches for msm kernel
      shell: bash
      run: |
        set -euo pipefail
        git clone --depth=1 https://github.com/nullptr-t-oss/kernel_patches.git my_patches

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd kernel_platform
        rm -f android/abi_gki_protected_exports_* || true
        df -h

    - name: Merge defconfig (gki + vendor)
      shell: bash
      run: |
        set -euo pipefail
        cd kernel_platform
        OUT=out
        mkdir -p "$OUT"
        # Merge gki + waipio vendor fragment
        ./scripts/kconfig/merge_config.sh -O "$OUT" -m \
          arch/arm64/configs/gki_defconfig \
          arch/arm64/configs/vendor/waipio_GKI.config
        cp "$OUT/.config" arch/arm64/configs/gki_defconfig
        rm "$OUT/.config"

    - name: Add nethunter specific drivers to be built as modules
      shell: bash
      run: |
        set -euo pipefail
        cd kernel_platform
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_REALTEK \
          --enable CONFIG_WLAN_VENDOR_ATH \
          --module CONFIG_ATH_COMMON --module CONFIG_ATH9K --module CONFIG_ATH9K_HW \
          --module CONFIG_ATH9K_HTC --module CONFIG_ATH9K_COMMON --module CONFIG_ATH10K \
          --module CONFIG_ATH10K_USB --module CONFIG_ATH11K \
          --enable CONFIG_WLAN_VENDOR_MEDIATEK \
          --module CONFIG_MT7601U --module CONFIG_MT76_CORE --module CONFIG_MT76_USB \
          --module CONFIG_MT76x02_LIB --module CONFIG_MT76x02_USB --module CONFIG_MT76_CONNAC_LIB \
          --module CONFIG_MT7603E --module CONFIG_MT76x2_COMMON --module CONFIG_MT76x0_COMMON \
          --module CONFIG_MT7615_COMMON --module CONFIG_MT7915E --module CONFIG_MT7921E \
          --module CONFIG_MAC80211_LEDS --module CONFIG_CAN_SLCAN

    - name: Replace mt76 with docdry0001 sm8475 version
      shell: bash
      run: |
        set -euo pipefail
        MEDIATEK_PATH="kernel_platform/drivers/net/wireless/mediatek"
        TEMP_DIR="$GITHUB_WORKSPACE/mediatek_new"
        git clone --no-checkout https://github.com/docdry0001/android_kernel_common_oneplus_sm8475.git "$TEMP_DIR"
        cd "$TEMP_DIR"
        git sparse-checkout init --cone
        git sparse-checkout set drivers/net/wireless/mediatek
        git checkout oneplus/sm8475
        echo "Replacing kernel mediatek folder with the new one..."
        rm -rf "$MEDIATEK_PATH"
        cp -r drivers/net/wireless/mediatek "$MEDIATEK_PATH"
        cd kernel_platform
        echo "mt76 replaced."

    - name: Add memkernel module
      shell: bash
      run: |
        cd kernel_platform
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M br0k3n

    - name: Apply kernel patches to msm kernel (OP11)
      shell: bash
      run: |
        cd kernel_platform
        shopt -s nullglob
        PATCHES=(../my_patches/kernel_patches/op11/msm/*.patch)
        if [ ${#PATCHES[@]} -gt 0 ]; then
          for patch_file in "${PATCHES[@]}"; do
            echo "Applying patch: $patch_file"
            patch -p1 < "$patch_file"
          done
        fi

    - name: FIX vmscan scan_adjusted (waipio)
      shell: bash
      run: |
        cd kernel_platform/mm
        sed -i '/bool scan_adjusted = false;/d' vmscan.c
        perl -0pi -e 's/(unsigned long nr_reclaimed = 0;\n\s*unsigned long nr_to_reclaim = sc->nr_to_reclaim;\n\s*)bool proportional_reclaim;/$1bool proportional_reclaim __maybe_unused;\n\tbool scan_adjusted = false;/s' vmscan.c

    - name: FIX thermal kvzalloc kvfree (waipio)
      shell: bash
      run: |
        FILE="kernel_platform/drivers/thermal/thermal_sysfs.c"
        python3 - <<'PY'
        import os
        from pathlib import Path
        path = Path(os.environ["FILE"])
        text = path.read_text()
        if "#include <linux/mm.h>" not in text and "#include <linux/slab.h>" in text:
            text = text.replace("#include <linux/slab.h>", "#include <linux/slab.h>\n#include <linux/mm.h>", 1)
        if "#define kvzalloc(size, flags)" not in text:
            shim = (
                "\n#ifndef kvzalloc\n"
                "#define kvzalloc(size, flags) kzalloc((size), (flags))\n"
                "#endif\n"
                "#ifndef kvfree\n"
                "#define kvfree(ptr) kfree((ptr))\n"
                "#endif\n"
            )
            if "#include <linux/mm.h>" in text:
                text = text.replace("#include <linux/mm.h>", "#include <linux/mm.h>" + shim, 1)
            elif "#include <linux/slab.h>" in text:
                text = text.replace("#include <linux/slab.h>", "#include <linux/slab.h>" + shim, 1)
        path.write_text(text)
        PY

    - name: FIX binder mmget_still_valid compat (waipio)
      shell: bash
      run: |
        FILE="kernel_platform/drivers/android/binder_alloc.c"
        sed -i '/^#include <linux\/mm.h>$/d' "$FILE"
        sed -i '/HAVE_MMGET_STILL_VALID_COMPAT/,+5d' "$FILE"
        sed -i 's/mmget_still_valid_still_valid/mmget_still_valid/g' "$FILE"
        grep -q '^#include <linux/sched/mm.h>$' "$FILE" || \
          sed -i '/^#include <linux\/list.h>$/a #include <linux/sched/mm.h>' "$FILE"
        grep -q 'HAVE_MMGET_STILL_VALID_COMPAT' "$FILE" || \
          perl -0pi -e 's@(#include <linux/sched/mm.h>\n)@$1#ifndef HAVE_MMGET_STILL_VALID_COMPAT\n#define HAVE_MMGET_STILL_VALID_COMPAT\nstatic inline bool mmget_still_valid(struct mm_struct *mm)\n{\n\treturn likely(!mm->core_state);\n}\n#endif\n@' "$FILE"

    - name: Clone rtl8812AU (aircrack-ng)
      shell: bash
      run: |
        mkdir -p vendor/extra/rtl8812au
        git clone --depth=1 https://github.com/aircrack-ng/rtl8812AU.git vendor/extra/rtl8812au
        rm -rf vendor/extra/rtl8812au/.git

    - name: Detect Clang
      shell: bash
      run: |
        CLANG_FOUND=false
        for base in kernel_platform/prebuilts kernel_platform/prebuilts-master; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done
        if ! $CLANG_FOUND; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
        fi
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

    - name: Build Kernel Modules
      shell: bash
      run: |
        set -euo pipefail
        cd kernel_platform
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=(
          LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump
          DEPMOD=depmod DTC=dtc STRIP=llvm-strip
          HOSTCC=clang HOSTCXX=clang++ CC="ccache clang"
        )

        OUT=out
        INSTALL_MOD_PATH="$PWD/out"
        mkdir -p "$OUT"

        make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig
        ./scripts/config --file "$OUT/.config" \
          --enable CONFIG_LTO_CLANG_THIN --enable CONFIG_LTO_CLANG \
          --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE --disable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3

        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" modules
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

        # External modules (QCOM, etc.)
        mkdir -p oplus/config
        touch oplus/config/modules.ext.$KERNEL_VER.oplus
        mkdir -p ../vendor/qcom/opensource/mmrm-driver/test
        printf 'obj-m :=\n' > ../vendor/qcom/opensource/mmrm-driver/test/Makefile

        MAKE_FLAGS+=(KERNEL_SRC="$PWD")

        EXT_QCOM=(
          ../vendor/qcom/opensource/mmrm-driver
          ../vendor/qcom/opensource/mm-drivers/hw_fence
          ../vendor/qcom/opensource/mm-drivers/sync_fence
          ../vendor/qcom/opensource/mm-drivers/msm_ext_display
          ../vendor/qcom/opensource/securemsm-kernel
          ../vendor/qcom/opensource/display-drivers/msm
          ../vendor/qcom/opensource/audio-kernel
          ../vendor/qcom/opensource/camera-kernel
          ../vendor/oplus/kernel/explorer
          ../vendor/qcom/opensource/video-driver
          ../vendor/qcom/opensource/graphics-kernel
          ../vendor/qcom/opensource/dataipa/drivers/platform/msm
          ../vendor/qcom/opensource/datarmnet/core
          ../vendor/qcom/opensource/datarmnet-ext/aps
          ../vendor/qcom/opensource/datarmnet-ext/offload
          ../vendor/qcom/opensource/datarmnet-ext/shs
          ../vendor/qcom/opensource/datarmnet-ext/sch
          ../vendor/qcom/opensource/datarmnet-ext/perf
          ../vendor/qcom/opensource/datarmnet-ext/perf_tether
          ../vendor/qcom/opensource/datarmnet-ext/wlan
          ../vendor/qcom/opensource/eva-kernel
          ../vendor/qcom/opensource/wlan/platform
          ../vendor/qcom/opensource/bt-kernel
          ../vendor/nxp/opensource/driver
          ../vendor/st/opensource/driver
          ../vendor/st/opensource/eSE-driver
          ../vendor/qcom/opensource/wlan/qcacld-3.0
          ../vendor/extra/rtl8812au
        )

        OPLUS_FLAGS=(CHIPSET_COMPANY=QCOM OPLUS_VND_BUILD_PLATFORM="$SOC")

        build_external_module() {
          local module="$1"
          echo "==== Processing module: $module ===="
          [ -d "$module" ] || return 0
          [ -f "$module/Makefile" ] || [ -f "$module/Kbuild" ] || return 0
          if [[ "$module" == *rtl8812au ]]; then
            export CONFIG_RTL8812AU=m
          fi
          make -C "$module" M="../$module" -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" "${OPLUS_FLAGS[@]}" modules || return 0
          make -C "$module" M="../$module" -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" "${OPLUS_FLAGS[@]}" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install || return 0
        }

        for MODULE in "${EXT_QCOM[@]}"; do
          build_external_module "$MODULE"
        done

    - name: Filter modules
      shell: bash
      run: |
        set -euo pipefail
        cd kernel_platform/out
        UNAME=$(ls lib/modules/)
        mkdir -p modules
        find lib/modules/"$UNAME" -type f -name '*.ko' -exec cp {} modules/ \;
        echo "Total modules copied: $(find modules -type f -name '*.ko' | wc -l)"

        cd modules
        curl -L -o default_modules.txt https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/default_modules.txt
        while IFS= read -r module; do
          [ -e "$module" ] && rm -f "$module"
        done < default_modules.txt
        echo "Modules remaining after filtering: $(find . -type f -name '*.ko' | wc -l)"

    - name: Create Kernel Modules zip
      shell: bash
      run: |
        cd kernel_platform/out
        ZIP_NAME="kernel_modules_OP11R.zip"
        find modules -type f -name '*.ko' -print0 | xargs -0 zip -j "$GITHUB_WORKSPACE/$ZIP_NAME"
        echo "Packaged kernel modules to $GITHUB_WORKSPACE/$ZIP_NAME"

    - name: Upload Kernel Modules zip
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-OP11R
        path: ${{ github.workspace }}/kernel_modules_OP11R.zip
