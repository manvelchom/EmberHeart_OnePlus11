name: Build OnePlus kernel modules

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  optimize_level:
    required: false
    type: string
    default: O2  # Choices: O2 or O3
  manifest:
    required: true
    type: string
    default: OOS16

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json
    
    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "MANIFEST=$MANIFEST_${{ inputs.manifest }}_MODULES" >> "$GITHUB_ENV"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"
        model="$MODEL"
        soc="$SOC"
        branch="$BRANCH"
        manifest="$MANIFEST"
        optimize='${{ inputs.optimize_level }}'
    
        [[ -n "$model" ]] || { echo "Input 'model' cannot be empty"; exit 1; }
        [[ -n "$soc" ]] || { echo "Input 'soc' cannot be empty"; exit 1; }
        [[ -n "$branch" ]] || { echo "Input 'branch' cannot be empty"; exit 1; }
        [[ -n "$manifest" ]] || { echo "Input 'manifest' cannot be empty"; exit 1; }
    
        if ! [[ "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
          echo "Input 'soc' contains invalid characters"; exit 1
        fi    
        if ! [[ "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          echo "Input 'branch' contains invalid characters"; exit 1
        fi    
        if [[ "$manifest" == http*://* ]]; then
          if ! [[ "$manifest" =~ ^https:// ]]; then
            echo "Manifest URL must be HTTPS"; exit 1
          fi
          if ! [[ "$manifest" =~ \.xml($|\?) ]]; then
            echo "Manifest URL should point to an XML file (.xml)"; exit 1
          fi
        else
          if ! [[ "$manifest" =~ \.xml$ ]]; then
            echo "Manifest filename must end with .xml"; exit 1
          fi
          if [[ "$manifest" =~ [[:space:]] ]]; then
            echo "Manifest filename cannot contain spaces"; exit 1
          fi
        fi
        case "$optimize" in
          O2|O3) ;;
          *) echo "optimize_level must be O2 or O3"; exit 1 ;;
        esac
        echo "Input validation OK."
        echo "::endgroup::"

    - name: Aggressive cleanup
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Cleanup space"
        sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google /opt/az /usr/local/share/powershell /opt/hostedtoolcache
        docker system prune -af || true
        docker builder prune -af || true
        df -h
        echo "::endgroup::"

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Install deps"
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache
        sudo apt-get clean
        echo "::endgroup::"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        echo "Creating folder for configuration: $CONFIG"
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        echo "Initializing and syncing kernel source..."
        if [[ "$MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$BRANCH" -m "$MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        "$REPO" --version
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch \
             -j"$(nproc --all)" --fail-fast; then
            success=true
            break
          fi
          echo "repo sync attempt $i failed; retrying..."
          sleep 30
        done
        $success || { echo "repo sync failed after 3 attempts"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        cd "$CONFIG_DIR/kernel_platform/msm-kernel"
        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
          fi
        done
        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found"; exit 1
        fi
        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        if [ -z "$ANDROID_VERSION" ]; then
          echo "Could not parse android version from BRANCH=$BRANCH_VALUE"
          exit 1
        fi
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        cd "$ARTIFACTS_DIR"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.19
      with:
        key: ${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}
        max-size: 5G
        append-timestamp: false
        create-symlink: true
        job-summary: 'CCache stats'
        evict-old-files: 'job'

    - name: Clone kernel patches for msm kernel
      shell: bash
      run: |
        set -euo pipefail
        echo "Cloning kernel patches for msm kernel..."
        git clone --depth=1 https://github.com/nullptr-t-oss/kernel_patches.git my_patches

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        df -h

    - name: Merge
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT=out
        cd "$MSM"
        make ARCH=arm64 mrproper
        mkdir -p "$OUT"
        ./scripts/kconfig/merge_config.sh -O "$OUT" -m arch/arm64/configs/gki_defconfig arch/arm64/configs/vendor/${SOC}_GKI.config
        cp "$OUT/.config" arch/arm64/configs/gki_defconfig
        rm "$OUT/.config"

    - name: Add nethunter specfic drivers already present in kernel to be built as modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        cd "$MSM"
        ./scripts/config --file arch/arm64/configs/gki_defconfig --enable CONFIG_WLAN_VENDOR_REALTEK
        ./scripts/config --file arch/arm64/configs/gki_defconfig --enable CONFIG_WLAN_VENDOR_ATH --module CONFIG_ATH_COMMON --module CONFIG_ATH9K --module CONFIG_ATH9K_HW --module CONFIG_ATH9K_HTC --module CONFIG_ATH9K_COMMON --module CONFIG_ATH10K --module CONFIG_ATH10K_USB --module CONFIG_ATH11K
        ./scripts/config --file arch/arm64/configs/gki_defconfig --enable CONFIG_WLAN_VENDOR_MEDIATEK --module CONFIG_MT7601U --module CONFIG_MT76_CORE --module CONFIG_MT76_USB --module CONFIG_MT76x02_LIB --module CONFIG_MT76x02_USB --module CONFIG_MT76_CONNAC_LIB --module CONFIG_MT7603E --module CONFIG_MT76x2_COMMON --module CONFIG_MT76x0_COMMON --module CONFIG_MT7615_COMMON --module CONFIG_MT7915E --module CONFIG_MT7921E --module CONFIG_MT7921U --module CONFIG_MT7921S
        ./scripts/config --file arch/arm64/configs/gki_defconfig --module CONFIG_MAC80211_LEDS --module CONFIG_CAN_SLCAN

    - name: Add memkernel module
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        cd "$MSM"
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M br0k3n
        
    - name: Add my kernel patches to msm kernel
      if: env.SOC == 'valod'
      shell: bash
      run: |
        set -euo pipefail
        echo "Applying kernel patches to msm kernel from my repo..."
        cd "$CONFIG/kernel_platform/msm-kernel"
        shopt -s nullglob
        PATCHES=(../../../my_patches/kernel_patches/op11/msm/*.patch)
        if [ ${#PATCHES[@]} -eq 0 ]; then
          echo "[!] No OP11 msm patches found, skipping."
        else
          for patch_file in "${PATCHES[@]}"; do
            echo "Applying patch: $patch_file"
            patch -p1 < "$patch_file"
          done
        fi
    
    - name: FIX vmscan scan_adjusted (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform/msm-kernel/mm"
        sed -i '/bool scan_adjusted = false;/d' vmscan.c
        perl -0pi -e 's/(unsigned long nr_reclaimed = 0;\n\s*unsigned long nr_to_reclaim = sc->nr_to_reclaim;\n\s*)bool proportional_reclaim;/$1bool proportional_reclaim __maybe_unused;\n\tbool scan_adjusted = false;/s' vmscan.c

    - name: FIX thermal kvzalloc kvfree (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        export FILE="$CONFIG/kernel_platform/msm-kernel/drivers/thermal/thermal_sysfs.c"
        python3 - <<'PY'
        import os
        from pathlib import Path
        path = Path(os.environ["FILE"])
        text = path.read_text()
        if "#include <linux/mm.h>" not in text and "#include <linux/slab.h>" in text:
            text = text.replace("#include <linux/slab.h>", "#include <linux/slab.h>\n#include <linux/mm.h>", 1)
        if "#define kvzalloc(size, flags)" not in text:
            shim = "\n#ifndef kvzalloc\n#define kvzalloc(size, flags) kzalloc((size), (flags))\n#endif\n#ifndef kvfree\n#define kvfree(ptr) kfree((ptr))\n#endif\n"
            if "#include <linux/mm.h>" in text:
                text = text.replace("#include <linux/mm.h>", "#include <linux/mm.h>" + shim, 1)
            elif "#include <linux/slab.h>" in text:
                text = text.replace("#include <linux/slab.h>", "#include <linux/slab.h>" + shim, 1)
        path.write_text(text)
        PY
    
    - name: FIX binder mmget_still_valid compat (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        FILE="$CONFIG/kernel_platform/msm-kernel/drivers/android/binder_alloc.c"
        sed -i '/^#include <linux\/mm.h>$/d' "$FILE"
        sed -i '/HAVE_MMGET_STILL_VALID_COMPAT/,+5d' "$FILE"
        sed -i 's/mmget_still_valid_still_valid/mmget_still_valid/g' "$FILE"
        grep -q '^#include <linux/sched/mm.h>$' "$FILE" || sed -i '/^#include <linux\/list.h>$/a #include <linux/sched/mm.h>' "$FILE"
        grep -q 'HAVE_MMGET_STILL_VALID_COMPAT' "$FILE" || perl -0pi -e 's@(#include <linux/sched/mm.h>\n)@$1#ifndef HAVE_MMGET_STILL_VALID_COMPAT\n#define HAVE_MMGET_STILL_VALID_COMPAT\nstatic inline bool mmget_still_valid(struct mm_struct *mm)\n{\n\treturn likely(!mm->core_state);\n}\n#endif\n@' "$FILE"

    # ---------- NEW: Clone rtl88xxau driver ----------
    - name: Clone rtl88xxau driver
      shell: bash
      run: |
        set -euo pipefail
        VENDOR_REALTEK="$GITHUB_WORKSPACE/$CONFIG/vendor/realtek"
        mkdir -p "$VENDOR_REALTEK"
        cd "$VENDOR_REALTEK"
        git clone --depth=1 https://github.com/n0ss/realtek-rtl88xxau-dkms.git rtl88xxau

    # ---------- PATCH: remove -Wimplicit-fallthrough=0 ----------
    - name: Patch rtl88xxau Makefile
      shell: bash
      run: |
        set -euo pipefail
        RTL_MAKEFILE="$GITHUB_WORKSPACE/$CONFIG/vendor/realtek/rtl88xxau/Makefile"
        if [ -f "$RTL_MAKEFILE" ]; then
          sed -i 's/-Wimplicit-fallthrough=0//g' "$RTL_MAKEFILE"
          echo "Removed -Wimplicit-fallthrough=0"
        fi

    - name: Detect Clang (toolchain for build)
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false
        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done
        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
          echo "Using system clang."
        fi
        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
        echo "Detected Clang: $CLANG_VERSION"

    - name: Build Kernel Modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        cd "$MSM"

        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=(
          LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump
          DEPMOD=depmod DTC=dtc STRIP=llvm-strip
          HOSTCC=clang HOSTCXX=clang++
          CC=ccache\ clang
        )

        OUT=out
        INSTALL_MOD_PATH="$MSM/out"
        mkdir -p "$OUT"

        make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig
        ./scripts/config --file "$OUT/.config" --enable CONFIG_LTO_CLANG_THIN --enable CONFIG_LTO_CLANG --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE --disable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3
        echo "Building in-tree kernel modules..."
        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" modules
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

        cd "$KERNEL_PLATFORM"
        mkdir -p "$KERNEL_PLATFORM/oplus/config"
        touch "$KERNEL_PLATFORM/oplus/config/modules.ext.$KERNEL_VER.oplus"
        mkdir -p "$KERNEL_PLATFORM/../vendor/qcom/opensource/mmrm-driver/test"
        printf 'obj-m :=\n' > "$KERNEL_PLATFORM/../vendor/qcom/opensource/mmrm-driver/test/Makefile"
        MAKE_FLAGS+=(KERNEL_SRC="$KERNEL_PLATFORM/./msm-kernel")

        mapfile -t EXT_OPLUS < "$KERNEL_PLATFORM/oplus/config/modules.ext.$KERNEL_VER.oplus" || true
        OPLUS_FLAGS=( CHIPSET_COMPANY=QCOM OPLUS_VND_BUILD_PLATFORM="$SOC" )
        EXT_QCOM=(
          ../vendor/qcom/opensource/mmrm-driver
          ../vendor/qcom/opensource/mm-drivers/hw_fence
          ../vendor/qcom/opensource/mm-drivers/sync_fence
          ../vendor/qcom/opensource/mm-drivers/msm_ext_display
          ../vendor/qcom/opensource/securemsm-kernel
          ../vendor/qcom/opensource/display-drivers/msm
          ../vendor/qcom/opensource/audio-kernel
          ../vendor/qcom/opensource/camera-kernel
          ../vendor/oplus/kernel/explorer
          ../vendor/qcom/opensource/video-driver
          ../vendor/qcom/opensource/graphics-kernel
          ../vendor/qcom/opensource/dataipa/drivers/platform/msm
          ../vendor/qcom/opensource/datarmnet/core
          ../vendor/qcom/opensource/datarmnet-ext/aps
          ../vendor/qcom/opensource/datarmnet-ext/offload
          ../vendor/qcom/opensource/datarmnet-ext/shs
          ../vendor/qcom/opensource/datarmnet-ext/sch
          ../vendor/qcom/opensource/datarmnet-ext/perf
          ../vendor/qcom/opensource/datarmnet-ext/perf_tether
          ../vendor/qcom/opensource/datarmnet-ext/wlan
          ../vendor/qcom/opensource/eva-kernel
          ../vendor/qcom/opensource/wlan/platform
          ../vendor/qcom/opensource/bt-kernel
          ../vendor/nxp/opensource/driver
          ../vendor/st/opensource/driver
          ../vendor/st/opensource/eSE-driver
          ../vendor/qcom/opensource/wlan/qcacld-3.0
        )

        MMRM_SYMVERS="$KERNEL_PLATFORM/../vendor/qcom/opensource/mmrm-driver/Module.symvers"

        build_external_module() {
          local module="$1"
          local extra_syms=()
          echo "==== Processing module: $module ===="
          [ -d "$module" ] || { echo "Skipping missing module dir: $module"; return 0; }
          [ -f "$module/Makefile" ] || [ -f "$module/Kbuild" ] || { echo "Skipping module without Makefile/Kbuild: $module"; return 0; }
          [[ "$module" == "../vendor/qcom/opensource/display-drivers/msm" && -f "$MMRM_SYMVERS" ]] && extra_syms+=(KBUILD_EXTRA_SYMBOLS="$MMRM_SYMVERS")
          make -C "$module" M="../$module" -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$MSM/out" "${OPLUS_FLAGS[@]}" "${extra_syms[@]}" modules || { echo "Build failed, skipping module: $module"; return 0; }
          make -C "$module" M="../$module" -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$MSM/out" "${OPLUS_FLAGS[@]}" "${extra_syms[@]}" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install || { echo "Install failed, skipping module: $module"; return 0; }
        }

        for MODULE in "${EXT_OPLUS[@]}"; do
          [ -n "$MODULE" ] || continue
          build_external_module "$MODULE"
        done
        for MODULE in "${EXT_QCOM[@]}"; do
          build_external_module "$MODULE"
        done

        # ---------- Build rtl88xxau external module (with safety KCFLAGS) ----------
        echo "==== Processing rtl88xxau driver ===="
        RTL88XXAU_DIR="$GITHUB_WORKSPACE/$CONFIG/vendor/realtek/rtl88xxau"
        if [ -d "$RTL88XXAU_DIR" ]; then
          make -C "$RTL88XXAU_DIR" clean
          make -C "$RTL88XXAU_DIR" \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KSRC="$MSM/out" \
            CC="ccache clang" \
            LD=ld.lld \
            KCFLAGS='-Wno-error' \
            -j"$(nproc --all)" \
            modules
          make -C "$RTL88XXAU_DIR" \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KSRC="$MSM/out" \
            INSTALL_MOD_PATH="$INSTALL_MOD_PATH" \
            modules_install
        else
          echo "rtl88xxau source not found, skipping"
        fi

    - name: Filter modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"
        UNAME=$(ls "$OUT/lib/modules/")
        cd "$OUT"
        mkdir -p modules
        find lib/modules/"$UNAME" -type f -name '*.ko' -exec cp {} modules/ \;
        echo "Total modules copied: $(find modules -type f -name '*.ko' | wc -l)"
        cd modules
        curl -L -o default_modules.txt https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/default_modules.txt
        while IFS= read -r module; do
          [ -e "$module" ] && rm -f "$module"
        done < default_modules.txt
        cd ..
        echo "Modules remaining after filtering: $(find modules -type f -name '*.ko' | wc -l)"

    - name: Create Kernel Modules zip
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        KERNEL_PLATFORM="$CONFIG_DIR/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"
        MODULES_SRC="$OUT/modules"
        MODULES_ZIP="$CONFIG_DIR/artifacts/kernel_modules_${{ env.MODEL }}.zip"
        mkdir -p "$CONFIG_DIR/artifacts"
        find "$MODULES_SRC" -type f -name '*.ko' -print0 | xargs -0 zip -j "$MODULES_ZIP"
        echo "Packaged kernel modules to $MODULES_ZIP"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "CCache Statistics :"
          echo "$(/usr/bin/ccache -s)"
        } | tee summary.txt
        {
          echo "### Kernel Modules Build Summary"
          echo ""
          echo "CCache Statistics :"
          echo "$(ccache -s -v)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Cleanup old ccache
      shell: bash
      run: |
        set -euo pipefail
        gh cache delete ccache-${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}- || true

    - name: Upload Kernel Modules zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
