    #     done

    - name: Add Nethunter Inline Configs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Applying Nethunter configs..."
        cd "$COMMON_KERNEL_FOLDER"

        # Bluetooth configs
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_BT_HCIBTUSB \
          --enable CONFIG_BT_HCIBTUSB_BCM \
          --enable CONFIG_BT_HCIBTUSB_RTL \
          --enable CONFIG_BT_HCIVHCI \
          --enable CONFIG_BT_HCIBCM203X \
          --enable CONFIG_BT_HCIBPA10X \
          --enable CONFIG_BT_HCIBFUSB

        # Airspy & HackRF
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_USB_AIRSPY \
          --enable CONFIG_USB_HACKRF

        # CAN
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_CAN \
          --enable CONFIG_CAN_DEV \
          --enable CONFIG_CAN_CALC_BITTIMING \
          --enable CONFIG_CAN_LEDS \
          --enable CONFIG_CAN_VCAN \
          --enable CONFIG_CAN_GRCAN \
          --enable CONFIG_CAN_XILINXCAN

        # Bosch C_CAN/D_CAN devices
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_CAN_C_CAN \
          --enable CONFIG_CAN_C_CAN_PLATFORM \
          --enable CONFIG_CAN_C_CAN_PCI

        # Bosch CC770 and Intel AN82527 devices
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_CAN_CC770 \
          --enable CONFIG_CAN_CC770_ISA \
          --enable CONFIG_CAN_CC770_PLATFORM

        # Bosch M_CAN devices
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_CAN_M_CAN \
          --enable CONFIG_CAN_M_CAN_PCI \
          --enable CONFIG_CAN_M_CAN_PLATFORM \
          --enable CONFIG_CAN_M_CAN_TCAN4X5X

        # CAN SPI interfaces
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_CAN_HI311X \
          --enable CONFIG_CAN_MCP251X

        # CAN USB interfaces
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_CAN_8DEV_USB \
          --enable CONFIG_CAN_EMS_USB \
          --enable CONFIG_CAN_ESD_USB2 \
          --enable CONFIG_CAN_GS_USB \
          --enable CONFIG_CAN_KVASER_USB \
          --enable CONFIG_CAN_PEAK_USB

        # CAN - Networking
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_NETLINK_DIAG \
          --enable CONFIG_VSOCKETS \
          --enable CONFIG_NET_SCHED \
          --enable CONFIG_NET_EMATCH_CANID

        # USB Serial Converter
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_USB_SERIAL \
          --enable CONFIG_USB_SERIAL_CONSOLE \
          --enable CONFIG_USB_SERIAL_GENERIC \
          --enable CONFIG_USB_SERIAL_CH341 \
          --enable CONFIG_USB_SERIAL_FTDI_SIO \
          --enable CONFIG_USB_SERIAL_PL2303

        # Mediatek drivers (in-tree, built-in)
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_MEDIATEK \
          --enable CONFIG_MT7601U \
          --enable CONFIG_MT76_CORE \
          --enable CONFIG_MT76_PCI \
          --enable CONFIG_MT76_USB \
          --enable CONFIG_MT76x02_LIB \
          --enable CONFIG_MT76x02_USB \
          --enable CONFIG_MT76_CONNAC_LIB \
          --enable CONFIG_MT7603E \
          --enable CONFIG_MT76x2_COMMON \
          --enable CONFIG_MT76x0_COMMON \
          --enable CONFIG_MT7615_COMMON \
          --enable CONFIG_MT7915E \
          --enable CONFIG_MT7921_COMMON \
          --enable CONFIG_MT7921E \
          --enable CONFIG_MT7921U

        # Other configs
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_MAC80211_LEDS \
          --enable CONFIG_CAN_SLCAN
          
        echo "Nethunter configs applied ✅"
        echo "::endgroup::"

    - name: Add TTL Support
      shell: bash
      run: |
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_IP_NF_TARGET_TTL=y
        	CONFIG_IP6_NF_TARGET_HL=y
        	CONFIG_IP6_NF_MATCH_HL=y
        EOF

    - name: Add IP_SET & IPv6 NAT
      shell: bash
      run: |
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_IP_SET=y
        	CONFIG_IP_SET_MAX=65534
        	CONFIG_IP_SET_BITMAP_IP=y
        	CONFIG_IP_SET_BITMAP_IPMAC=y
        	CONFIG_IP_SET_BITMAP_PORT=y
        	CONFIG_IP_SET_HASH_IP=y
        	CONFIG_IP_SET_HASH_IPPORT=y
        	CONFIG_IP_SET_HASH_IPPORTIP=y
        	CONFIG_IP_SET_HASH_IPPORTNET=y
        	CONFIG_IP_SET_HASH_IPMAC=y
        	CONFIG_IP_SET_HASH_MAC=y
        	CONFIG_IP_SET_HASH_NET=y
        	CONFIG_IP_SET_HASH_NETPORT=y
        	CONFIG_IP_SET_HASH_NETIFACE=y
        	CONFIG_IP_SET_LIST_SET=y
        	CONFIG_IP6_NF_NAT=y
        	CONFIG_IP6_NF_TARGET_MASQUERADE=y
        EOF

    - name: Add BBR
      shell: bash
      run: |
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_TCP_CONG_ADVANCED=y
        	CONFIG_TCP_CONG_BBR=y
        	CONFIG_NET_SCH_FQ=y
        	CONFIG_NET_SCH_FQ_CODEL=y
        EOF

    - name: Add Build Configs & MAC80211=m
      shell: bash
      run: |
        cd "$COMMON_KERNEL_FOLDER"
        cat >> arch/arm64/configs/gki_defconfig <<-EOF
        	CONFIG_LTO_CLANG_THIN=y
        	CONFIG_LTO_CLANG=y
        	CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        	CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n
        	CONFIG_OPTIMIZE_INLINING=y
        	CONFIG_FRAME_WARN=0
        	CONFIG_TRACEPOINTS=y
        EOF
        ./scripts/config --file arch/arm64/configs/gki_defconfig --enable CONFIG_MAC80211

    - name: Save Build Metadata
      id: save_metadata
      shell: bash
      run: |
        cd "$ARTIFACTS_FOLDER"
        echo "kernel_version=$KERNEL_FULL_VER" >> "$GITHUB_OUTPUT"
        echo "ksu_version=$KSUVER" >> "$GITHUB_OUTPUT"
        echo "susfs_version=$SUSVER" >> "$GITHUB_OUTPUT"

    - name: Detect Clang
      shell: bash
      run: |
        for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base/clang/host/linux-x86/clang-r"* 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            break
          fi
        done
        [ -z "${CLANG_BIN:-}" ] && { echo "No clang found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

    - name: Build Kernel
      shell: bash
      run: |
        export LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu- LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
        export PATH="/usr/lib/ccache:${CLANG_BIN_PATH}:$PATH"
        export CC="ccache clang" HOSTCC="ccache clang" HOSTCXX="ccache clang++"
        cd "$COMMON_KERNEL_FOLDER"
        : > .scmversion
        OUT=out
        mkdir -p "$OUT"
        make O="$OUT" gki_defconfig
        ./scripts/config --file "$OUT/.config" --set-str LOCALVERSION "-${ANDROID_VER}-${{ inputs.kernel_uname }}"
        make O="$OUT" olddefconfig
        make -j$(nproc --all) O="$OUT" modules_prepare
        make -j$(nproc --all) O="$OUT" Image || { echo "Kernel build failed"; exit 1; }

    - name: Build Linux Headers .deb Package
      if: success()
      shell: bash
      run: |
        set -euo pipefail
        cd "$COMMON_KERNEL_FOLDER"
        OUT=out
        KERNELRELEASE=$(make O="$OUT" -s kernelrelease)
        HEADERS_DIR="$GITHUB_WORKSPACE/linux-headers-$KERNELRELEASE"
        rm -rf "$HEADERS_DIR"
        mkdir -p "$HEADERS_DIR/DEBIAN"
        mkdir -p "$HEADERS_DIR/usr/src/linux-headers-$KERNELRELEASE"
        make O="$OUT" ARCH=arm64 headers_install INSTALL_HDR_PATH="$HEADERS_DIR/usr"
        cp "$OUT/.config" "$HEADERS_DIR/usr/src/linux-headers-$KERNELRELEASE/.config"
        if [ -f "$OUT/Module.symvers" ]; then
          cp "$OUT/Module.symvers" "$HEADERS_DIR/usr/src/linux-headers-$KERNELRELEASE/Module.symvers"
        else
          echo "::warning::Module.symvers not found; headers package will lack symbol version info"
        fi
        cat > "$HEADERS_DIR/DEBIAN/control" <<-EOF
        Package: linux-headers-$KERNELRELEASE
        Version: $KERNELRELEASE
        Architecture: arm64
        Maintainer: $BUILD_USER <$BUILD_USER@$BUILD_HOST>
        Description: Linux kernel headers for $KERNELRELEASE
         This package provides kernel header files for version $KERNELRELEASE,
         useful for building external kernel modules like DKMS or manual compilations.
        EOF
        cd "$GITHUB_WORKSPACE"
        dpkg-deb --build "linux-headers-$KERNELRELEASE"
        mv "linux-headers-${KERNELRELEASE}.deb" "$ARTIFACTS_FOLDER/"
        echo "✅ Headers .deb created: $ARTIFACTS_FOLDER/linux-headers-${KERNELRELEASE}.deb"

    - name: Configure backports for MT76/MT7921 only
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE/backports-stable"
        find . -name "Makefile" -type f -exec sed -i 's/cfg80211-/bp_cfg80211-/g' {} +
        find . -name "Makefile" -type f -exec sed -i 's/mac80211-/bp_mac80211-/g' {} +
        sed -i 's/obj-$(CPTCFG_CFG80211) += cfg80211.o/obj-$(CPTCFG_CFG80211) += bp_cfg80211.o/' net/wireless/Makefile
        sed -i 's/obj-$(CPTCFG_MAC80211) += mac80211.o/obj-$(CPTCFG_MAC80211) += bp_mac80211.o/' net/mac80211/Makefile
        if [ -d "drivers/net/wireless/mediatek/mt76" ]; then
          find drivers/net/wireless/mediatek/mt76/ -name "Makefile" -type f -exec sed -i 's/mac80211/bp_mac80211/g' {} +
          find drivers/net/wireless/mediatek/mt76/ -name "Kconfig" -type f -exec sed -i 's/MAC80211/BP_MAC80211/g' {} +
        fi
        KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"
        if [ -n "${CLANG_BIN:-}" ] && [ -x "${CLANG_BIN}/clang" ]; then
          export PATH="${CLANG_BIN}:$PATH"
        fi
        export PATH="/usr/lib/ccache:$PATH"
        MAKE_FLAGS=(
          LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump
          STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++
          CC="ccache clang"
        )
        make "${MAKE_FLAGS[@]}" KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" allnoconfig
        printf '%s\n' \
          'CPTCFG_WLAN=y' \
          'CPTCFG_CFG80211=m' \
          'CPTCFG_MAC80211=m' \
          'CPTCFG_MAC80211_LEDS=y' \
          'CPTCFG_WLAN_VENDOR_MEDIATEK=y' \
          'CPTCFG_MT76_CORE=m' \
          'CPTCFG_MT76_LEDS=y' \
          'CPTCFG_MT76_USB=m' \
          'CPTCFG_MT7921_COMMON=m' \
          'CPTCFG_MT7921U=m' >> .config
        make "${MAKE_FLAGS[@]}" KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" olddefconfig > .config
        make "${MAKE_FLAGS[@]}" KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" olddefconfig
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" \
          KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" \
          V=1 2>&1 | tee ../backports-build.log
        KO_COUNT=$(find . -name '*.ko' | wc -l)
        echo "Backports built .ko count: $KO_COUNT"
        [ "$KO_COUNT" -gt 0 ] || exit 1
        mkdir -p ../backports-artifacts
        find . -name '*.ko' -exec cp --parents {} ../backports-artifacts/ \;
        cp .config ../backports-artifacts/backports.config
        cp ../backports-build.log ../backports-artifacts/

    - name: Create AnyKernel3 ZIP with backports modules
      id: create_zip
      shell: bash
      run: |
        cp "$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image" "$AK3_FOLDER/"
        cp "$ARTIFACTS_FOLDER/${OP_MODEL}.txt" "$AK3_FOLDER/"
        
        # Copy backports .ko files into AnyKernel3
        mkdir -p "$AK3_FOLDER/modules/backports"
        find "$GITHUB_WORKSPACE/backports-artifacts" -name '*.ko' -exec cp {} "$AK3_FOLDER/modules/backports/" \;
        
        # Add post-fs-data.sh to load backports
        cat > "$AK3_FOLDER/post-fs-data.sh" <<'EOF'
        #!/system/bin/sh
        MODDIR=${0%/*}
        MODPATH="$MODDIR/modules/backports"
        # Unload in-tree modules if present
        rmmod mac80211 2>/dev/null
        rmmod cfg80211 2>/dev/null
        sleep 1
        # Load backports stack
        insmod "$MODPATH/compat.ko" 2>/dev/null
        insmod "$MODPATH/cfg80211.ko" 2>/dev/null
        insmod "$MODPATH/mac80211.ko" 2>/dev/null
        insmod "$MODPATH/mt76.ko" 2>/dev/null
        insmod "$MODPATH/mt76-usb.ko" 2>/dev/null
        insmod "$MODPATH/mt76-connac-lib.ko" 2>/dev/null
        insmod "$MODPATH/mt7921-common.ko" 2>/dev/null
        insmod "$MODPATH/mt7921u.ko" 2>/dev/null
        EOF
        chmod +x "$AK3_FOLDER/post-fs-data.sh"
        
        cd "$AK3_FOLDER"
        ZIP_NAME="AK3_${OP_MODEL}_${KERNEL_FULL_VER}_KSUN_${KSUVER}_SuSFS_${SUSVER}.zip"
        zip -r "$ZIP_NAME" . -x "*.git*"
        mv "$ZIP_NAME" "$ARTIFACTS_FOLDER/"
        ZIP_SHA256=$(sha256sum "$ARTIFACTS_FOLDER/$ZIP_NAME" | awk '{print $1}')
        echo "zip_sha256=$ZIP_SHA256" >> "$GITHUB_OUTPUT"
        echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

    - name: Collect Build Stats
      id: collect_stats
      shell: bash
      run: |
        IMG="$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image"
        IMG_SHA256=$(sha256sum "$IMG" | awk '{print $1}')
        WARNINGS_COUNT=$(grep -ci warning "$COMMON_KERNEL_FOLDER/build.log" 2>/dev/null || echo 0)
        echo "image_sha256=$IMG_SHA256" >> "$GITHUB_OUTPUT"
        echo "warnings_count=$WARNINGS_COUNT" >> "$GITHUB_OUTPUT"

    - name: List artifacts folder
      if: always()
      shell: bash
      run: |
        echo "Contents of $ARTIFACTS_FOLDER:"
        ls -la "$ARTIFACTS_FOLDER"

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.CONFIG }}
        path: |
          ${{ env.ARTIFACTS_FOLDER }}/AK3_*.zip
          ${{ env.ARTIFACTS_FOLDER }}/linux-headers-*.deb
