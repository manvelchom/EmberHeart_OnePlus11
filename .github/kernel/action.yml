name: Build OnePlus EmberHeart Kernel

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  ksun_branch_or_hash:
    description: 'KernelSU Next branch or commit hash (empty = auto)'
    required: false
    type: string
    default: ""
  susfs_commit_hash_or_branch:
    description: 'SUSFS branch or commit hash (empty = auto-detect by kernel version)'
    required: false
    type: string
    default: ""
  manifest:
    description: 'Manifest selection (OOS14, OOS15, OOS16, etc.)'
    required: false
    type: string
    default: "OOS16"
  optimize_level:
    description: 'Compiler optimization level (O2 or O3)'
    required: false
    type: string
    default: O2
  kernel_uname:
    description: 'Custom kernel localversion string'
    required: false
    type: string
    default: "EmberHeart"

outputs:
  kernel_version:
    value: ${{ steps.save_metadata.outputs.kernel_version }}
  ksu_version:
    value: ${{ steps.save_metadata.outputs.ksu_version }}
  susfs_version:
    value: ${{ steps.save_metadata.outputs.susfs_version }}
  image_sha256:
    value: ${{ steps.collect_stats.outputs.image_sha256 }}
  zip_sha256:
    value: ${{ steps.create_zip.outputs.zip_sha256 }}
  warnings:
    value: ${{ steps.collect_stats.outputs.warnings_count }}

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "OP_\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Map Manifest Choice to XML
      shell: bash
      run: |
        choice="${{ inputs.manifest }}"
        case "${choice^^}" in
          OOS14)            var="OP_MANIFEST_OOS14" ;;
          OOS15)            var="OP_MANIFEST_OOS15" ;;
          FAST_BUILD_OOS15|OOS15_FAST) var="OP_MANIFEST_OOS15_MODULES" ;;
          OOS16)            var="OP_MANIFEST_OOS16" ;;
          OOS16_CUSTOM)     var="OP_MANIFEST_OOS16_CUSTOM" ;;
          *) echo "Unknown manifest choice: $choice"; exit 1 ;;
        esac
        manifest_file="${!var}"
        [ -n "$manifest_file" ] || { echo "Manifest variable $var is empty. Check config JSON."; exit 1; }
        echo "OP_MANIFEST=$manifest_file" >> "$GITHUB_ENV"
        echo "Using manifest file: $manifest_file"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        model="$OP_MODEL"
        soc="$OP_SOC"
        branch="$OP_BRANCH"
        manifest="$OP_MANIFEST"
        optimize='${{ inputs.optimize_level }}'
        [ -n "$model" ] || { echo "model empty"; exit 1; }
        [ -n "$soc" ] || { echo "soc empty"; exit 1; }
        [ -n "$branch" ] || { echo "branch empty"; exit 1; }
        [ -n "$manifest" ] || { echo "manifest empty"; exit 1; }
        case "$optimize" in O2|O3) ;; *) echo "optimize must be O2 or O3"; exit 1; ;; esac
        echo "✅ Validation passed"

    - name: Setup Base Environment
      shell: bash
      run: |
        CONFIG="$OP_MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        [ -x "$REPO" ] || { curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO" && chmod +x "$REPO"; }
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Optimize Global Git for Repo Tool
      shell: bash
      run: |
        git config --global feature.manyFiles true
        git config --global core.fsmonitor true
        git config --global pack.sparse true

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        if [[ "$OP_MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --location --proto '=https' "$OP_MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOOS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/docdry0001/kernel_manifest.git -b "$OP_BRANCH" -m "$OP_MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            success=true; break
          fi
          sleep 20
        done
        $success || { echo "repo sync failed"; exit 1; }

    - name: Set Dir Paths
      shell: bash
      run: |
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        KERNEL_PLATFORM_DIR="$CONFIG_DIR/kernel_platform"
        COMMON_KERNEL_DIR="$KERNEL_PLATFORM_DIR/common"
        AK3_DIR="$GITHUB_WORKSPACE/AnyKernel3"
        KERNEL_PATCHES_DIR="$GITHUB_WORKSPACE/kernel_patches"
        SUSFS_DIR="$GITHUB_WORKSPACE/susfs4ksu"
        KSUN_DIR="$KERNEL_PLATFORM_DIR/KernelSU-Next"
        mkdir -p "$ARTIFACTS_DIR"
        echo "CONFIG_FOLDER=$CONFIG_DIR" >> "$GITHUB_ENV"
        echo "ARTIFACTS_FOLDER=$ARTIFACTS_DIR" >> "$GITHUB_ENV"
        echo "KERNEL_PLATFORM_FOLDER=$KERNEL_PLATFORM_DIR" >> "$GITHUB_ENV"
        echo "COMMON_KERNEL_FOLDER=$COMMON_KERNEL_DIR" >> "$GITHUB_ENV"
        echo "AK3_FOLDER=$AK3_DIR" >> "$GITHUB_ENV"
        echo "KERNEL_PATCHES_FOLDER=$KERNEL_PATCHES_DIR" >> "$GITHUB_ENV"
        echo "SUSFS_FOLDER=$SUSFS_DIR" >> "$GITHUB_ENV"
        echo "KSUN_FOLDER=$KSUN_DIR" >> "$GITHUB_ENV"

    - name: Get Kernel Version Info
      shell: bash
      run: |
        cd "$COMMON_KERNEL_FOLDER"
        BRANCH_LINE=$(grep -m1 '^[[:space:]]*BRANCH=' build.config.common 2>/dev/null || true)
        [ -z "$BRANCH_LINE" ] && BRANCH_LINE=$(grep -m1 '^[[:space:]]*BRANCH=' build.config.constants 2>/dev/null || true)
        ANDROID_VERSION="${BRANCH_LINE#*=}"; ANDROID_VERSION="${ANDROID_VERSION%-*}"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        SUSFS_KERNEL_BRANCH="gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL"
        cd "$ARTIFACTS_FOLDER"
        echo "$ANDROID_VERSION-$FULL_VERSION" > "${OP_MODEL}.txt"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=$SUSFS_KERNEL_BRANCH" >> "$GITHUB_ENV"

    - name: Set Build Identity
      shell: bash
      run: |
        echo "BUILD_USER=OnePlus" >> "$GITHUB_ENV"
        echo "BUILD_HOST=ubuntu-build" >> "$GITHUB_ENV"

    - name: Install Dependencies & ccache
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache zstd
        sudo apt-get clean
        export CCACHE_DIR="$HOME/.ccache"
        echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
        mkdir -p "$CCACHE_DIR"
        ccache -M 5G
        ccache -o compression=true

    - name: Clone Dependencies
      shell: bash
      run: |
        git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b gki-2.0
        git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git
        git clone --depth=1 https://github.com/nullptr-t-oss/kernel_patches.git my_patches
        git clone https://gitlab.com/simonpunk/susfs4ksu.git
        cd susfs4ksu
        SUSFS_INPUT="${{ inputs.susfs_commit_hash_or_branch }}"
        if [ -z "$SUSFS_INPUT" ]; then
          SUSFS_BRANCH="$SUSFS_KERNEL_BRANCH"
        else
          SUSFS_BRANCH="$SUSFS_INPUT"
        fi
        if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
        elif git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
        else
          echo "SUSFS ref not found: $SUSFS_BRANCH"; exit 1
        fi
        SUSFS_COMMIT_SHA=$(git rev-parse HEAD)
        echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA" >> $GITHUB_ENV
        echo "SUSFS_BRANCH_NAME=$SUSFS_BRANCH" >> $GITHUB_ENV

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        cd "$KERNEL_PLATFORM_FOLDER"
        rm -f common/android/abi_gki_protected_exports_* || true
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true

    - name: Add KernelSU Next
      shell: bash
      run: |
        cd "$KERNEL_PLATFORM_FOLDER"
        KSU_INPUT="${{ inputs.ksun_branch_or_hash }}"
        if [ -z "$KSU_INPUT" ]; then
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
        else
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s "$KSU_INPUT"
        fi
        git submodule update --init --recursive
        cd KernelSU-Next/kernel
        COMMITS_COUNT=$(git rev-list --count HEAD)
        BASE_VERSION=$(( COMMITS_COUNT < 2684 ? 10200 : 30000 ))
        KSU_VERSION=$(( COMMITS_COUNT + BASE_VERSION ))
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
        cd ..
        KSU_COMMIT_SHA=$(git rev-parse HEAD)
        echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA" >> $GITHUB_ENV
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_KSU=y
        	CONFIG_KSU_KPROBES_HOOK=n
        EOF

    # - name: Apply SUSFS Patches (v2.1.0)
    #   shell: bash
    #   run: |
    #     cd "$KERNEL_PLATFORM_FOLDER"
    #     cp "$SUSFS_FOLDER/kernel_patches/fs/"* "$COMMON_KERNEL_FOLDER/fs/"
    #     cp "$SUSFS_FOLDER/kernel_patches/include/linux/"* "$COMMON_KERNEL_FOLDER/include/linux/"
    #     susfs_version=$(grep '#define SUSFS_VERSION' "$COMMON_KERNEL_FOLDER/include/linux/susfs.h" | awk -F'"' '{print $2}')
    #     echo "SUSVER=$susfs_version" >> $GITHUB_ENV
