name: Build OnePlus EmberHeart Kernel

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  ksun_branch_or_hash:
    description: 'KernelSU Next branch or commit hash (empty = auto)'
    required: false
    type: string
    default: ""
  susfs_commit_hash_or_branch:
    description: 'SUSFS branch or commit hash (empty = auto-detect by kernel version)'
    required: false
    type: string
    default: ""
  manifest:
    description: 'Manifest selection (OOS14, OOS15, OOS16, etc.)'
    required: false
    type: string
    default: "OOS16"
  optimize_level:
    description: 'Compiler optimization level (O2 or O3)'
    required: false
    type: string
    default: O2
  kernel_uname:
    description: 'Custom kernel localversion string'
    required: false
    type: string
    default: "docEmberHeartdry"
  backports_release:
    description: 'Backports release version (git branch)'
    required: false
    type: string
    default: backports-6.1.97-1

outputs:
  kernel_version:
    value: ${{ steps.save_metadata.outputs.kernel_version }}
  ksu_version:
    value: ${{ steps.save_metadata.outputs.ksu_version }}
  susfs_version:
    value: ${{ steps.save_metadata.outputs.susfs_version }}
  image_sha256:
    value: ${{ steps.collect_stats.outputs.image_sha256 }}
  zip_sha256:
    value: ${{ steps.create_zip.outputs.zip_sha256 }}
  warnings:
    value: ${{ steps.collect_stats.outputs.warnings_count }}

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "OP_\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Map Manifest Choice to XML
      shell: bash
      run: |
        choice="${{ inputs.manifest }}"
        case "${choice^^}" in
          OOS14)            var="OP_MANIFEST_OOS14" ;;
          OOS15)            var="OP_MANIFEST_OOS15" ;;
          FAST_BUILD_OOS15|OOS15_FAST) var="OP_MANIFEST_OOS15_MODULES" ;;
          OOS16)            var="OP_MANIFEST_OOS16" ;;
          OOS16_CUSTOM)     var="OP_MANIFEST_OOS16_CUSTOM" ;;
          *) echo "Unknown manifest choice: $choice"; exit 1 ;;
        esac
        manifest_file="${!var}"
        [ -n "$manifest_file" ] || { echo "Manifest variable $var is empty. Check config JSON."; exit 1; }
        echo "OP_MANIFEST=$manifest_file" >> "$GITHUB_ENV"
        echo "Using manifest file: $manifest_file"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        model="$OP_MODEL"
        soc="$OP_SOC"
        branch="$OP_BRANCH"
        manifest="$OP_MANIFEST"
        optimize='${{ inputs.optimize_level }}'
        [ -n "$model" ] || { echo "model empty"; exit 1; }
        [ -n "$soc" ] || { echo "soc empty"; exit 1; }
        [ -n "$branch" ] || { echo "branch empty"; exit 1; }
        [ -n "$manifest" ] || { echo "manifest empty"; exit 1; }
        case "$optimize" in O2|O3) ;; *) echo "optimize must be O2 or O3"; exit 1; ;; esac
        echo "✅ Validation passed"

    - name: Setup Base Environment
      shell: bash
      run: |
        CONFIG="$OP_MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        [ -x "$REPO" ] || { curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO" && chmod +x "$REPO"; }
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Optimize Global Git for Repo Tool
      shell: bash
      run: |
        git config --global feature.manyFiles true
        git config --global core.fsmonitor true
        git config --global pack.sparse true

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        if [[ "$OP_MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --location --proto '=https' "$OP_MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$OP_BRANCH" -m "$OP_MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            success=true; break
          fi
          sleep 20
        done
        $success || { echo "repo sync failed"; exit 1; }

    - name: Set Dir Paths
      shell: bash
      run: |
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        KERNEL_PLATFORM_DIR="$CONFIG_DIR/kernel_platform"
        COMMON_KERNEL_DIR="$KERNEL_PLATFORM_DIR/common"
        AK3_DIR="$GITHUB_WORKSPACE/AnyKernel3"
        KERNEL_PATCHES_DIR="$GITHUB_WORKSPACE/kernel_patches"
        SUSFS_DIR="$GITHUB_WORKSPACE/susfs4ksu"
        KSUN_DIR="$KERNEL_PLATFORM_DIR/KernelSU-Next"
        mkdir -p "$ARTIFACTS_DIR"
        echo "CONFIG_FOLDER=$CONFIG_DIR" >> "$GITHUB_ENV"
        echo "ARTIFACTS_FOLDER=$ARTIFACTS_DIR" >> "$GITHUB_ENV"
        echo "KERNEL_PLATFORM_FOLDER=$KERNEL_PLATFORM_DIR" >> "$GITHUB_ENV"
        echo "COMMON_KERNEL_FOLDER=$COMMON_KERNEL_DIR" >> "$GITHUB_ENV"
        echo "AK3_FOLDER=$AK3_DIR" >> "$GITHUB_ENV"
        echo "KERNEL_PATCHES_FOLDER=$KERNEL_PATCHES_DIR" >> "$GITHUB_ENV"
        echo "SUSFS_FOLDER=$SUSFS_DIR" >> "$GITHUB_ENV"
        echo "KSUN_FOLDER=$KSUN_DIR" >> "$GITHUB_ENV"

    - name: Get Kernel Version Info
      shell: bash
      run: |
        cd "$COMMON_KERNEL_FOLDER"
        BRANCH_LINE=$(grep -m1 '^[[:space:]]*BRANCH=' build.config.common 2>/dev/null || true)
        [ -z "$BRANCH_LINE" ] && BRANCH_LINE=$(grep -m1 '^[[:space:]]*BRANCH=' build.config.constants 2>/dev/null || true)
        ANDROID_VERSION="${BRANCH_LINE#*=}"; ANDROID_VERSION="${ANDROID_VERSION%-*}"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        SUSFS_KERNEL_BRANCH="gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL"
        cd "$ARTIFACTS_FOLDER"
        echo "$ANDROID_VERSION-$FULL_VERSION" > "${OP_MODEL}.txt"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=$SUSFS_KERNEL_BRANCH" >> "$GITHUB_ENV"

    - name: Set Build Identity
      shell: bash
      run: |
        echo "BUILD_USER=OnePlus" >> "$GITHUB_ENV"
        echo "BUILD_HOST=ubuntu-build" >> "$GITHUB_ENV"

    - name: Install Dependencies & ccache
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache zstd
        sudo apt-get clean
        export CCACHE_DIR="$HOME/.ccache"
        echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
        mkdir -p "$CCACHE_DIR"
        ccache -M 5G
        ccache -o compression=true

    - name: Clone Dependencies
      shell: bash
      run: |
        git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b gki-2.0
        git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git
        git clone --depth=1 https://github.com/nullptr-t-oss/kernel_patches.git my_patches
        git clone https://gitlab.com/simonpunk/susfs4ksu.git
        cd susfs4ksu
        SUSFS_INPUT="${{ inputs.susfs_commit_hash_or_branch }}"
        if [ -z "$SUSFS_INPUT" ]; then
          SUSFS_BRANCH="$SUSFS_KERNEL_BRANCH"
        else
          SUSFS_BRANCH="$SUSFS_INPUT"
        fi
        if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
        elif git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
        else
          echo "SUSFS ref not found: $SUSFS_BRANCH"; exit 1
        fi
        SUSFS_COMMIT_SHA=$(git rev-parse HEAD)
        echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA" >> $GITHUB_ENV
        echo "SUSFS_BRANCH_NAME=$SUSFS_BRANCH" >> $GITHUB_ENV

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        cd "$KERNEL_PLATFORM_FOLDER"
        rm -f common/android/abi_gki_protected_exports_* || true
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true

    - name: Add KernelSU Next
      shell: bash
      run: |
        cd "$KERNEL_PLATFORM_FOLDER"
        KSU_INPUT="${{ inputs.ksun_branch_or_hash }}"
        if [ -z "$KSU_INPUT" ]; then
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
        else
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s "$KSU_INPUT"
        fi
        git submodule update --init --recursive
        cd KernelSU-Next/kernel
        COMMITS_COUNT=$(git rev-list --count HEAD)
        BASE_VERSION=$(( COMMITS_COUNT < 2684 ? 10200 : 30000 ))
        KSU_VERSION=$(( COMMITS_COUNT + BASE_VERSION ))
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
        cd ..
        KSU_COMMIT_SHA=$(git rev-parse HEAD)
        echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA" >> $GITHUB_ENV
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_KSU=y
        	CONFIG_KSU_KPROBES_HOOK=n
        EOF

    - name: Apply SUSFS Patches (v2.1.0)
      shell: bash
      run: |
        cd "$KERNEL_PLATFORM_FOLDER"
        cp "$SUSFS_FOLDER/kernel_patches/fs/"* "$COMMON_KERNEL_FOLDER/fs/"
        cp "$SUSFS_FOLDER/kernel_patches/include/linux/"* "$COMMON_KERNEL_FOLDER/include/linux/"
        susfs_version=$(grep '#define SUSFS_VERSION' "$COMMON_KERNEL_FOLDER/include/linux/susfs.h" | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        cd "$KSUN_FOLDER"
        patch -p1 --forward < "$SUSFS_FOLDER/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
        for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
          patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/next/susfs_fix_patches/$susfs_version/fix_$file.patch"
        done
        patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/next/susfs_fix_patches/$susfs_version/overwrite_hook_mode.patch"
        patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/next/susfs_fix_patches/$susfs_version/ksu_toolkit.patch"
        if [ "$KSUVER" -le 33095 ]; then
          patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/next/susfs_fix_patches/$susfs_version/multi_manager.patch"
        fi
        # Fix implicit declarations
        cd kernel
        sed -i 's/ksu_sucompat_init();/\/\* SUSFS fix \*\/ \/\/ ksu_sucompat_init();/' core/init.c
        sed -i 's/ksu_setuid_hook_init();/\/\* SUSFS fix \*\/ \/\/ ksu_setuid_hook_init();/' core/init.c
        cd "$COMMON_KERNEL_FOLDER"
        patch -p1 --forward < "$SUSFS_FOLDER/kernel_patches/50_add_susfs_in_$SUSFS_KERNEL_BRANCH.patch"
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_KSU_SUSFS=y
        	CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        	CONFIG_KSU_SUSFS_SUS_PATH=y
        	CONFIG_KSU_SUSFS_SUS_MOUNT=y
        	CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        	CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        	CONFIG_KSU_SUSFS_SUS_KSTAT=y
        	CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
        	CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        	CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        	CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        	CONFIG_KSU_SUSFS_ENABLE_LOG=y
        	CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        	CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        	CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        	CONFIG_KSU_SUSFS_SUS_MAP=y
        	CONFIG_KSU_SUSFS_SUS_SU=n
        	CONFIG_TMPFS_XATTR=y
        	CONFIG_TMPFS_POSIX_ACL=y
        EOF

    - name: Add BBG
      shell: bash
      run: |
        cd "$KERNEL_PLATFORM_FOLDER"
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash -s main || echo "BBG setup failed, continuing..."
        echo "CONFIG_BBG=y" >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' "$COMMON_KERNEL_FOLDER/security/Kconfig"

    - name: Apply Common Optimizations
      shell: bash
      run: |
        cd "$COMMON_KERNEL_FOLDER"
        for patch in \
          "$KERNEL_PATCHES_FOLDER/common/mem_opt_prefetch.patch" \
          "$KERNEL_PATCHES_FOLDER/common/minimise_wakeup_time.patch" \
          "$KERNEL_PATCHES_FOLDER/common/int_sqrt.patch" \
          "$KERNEL_PATCHES_FOLDER/common/force_tcp_nodelay.patch" \
          "$KERNEL_PATCHES_FOLDER/common/reduce_gc_thread_sleep_time.patch" \
          "$KERNEL_PATCHES_FOLDER/common/add_timeout_wakelocks_globally.patch" \
          "$KERNEL_PATCHES_FOLDER/common/f2fs_reduce_congestion.patch" \
          "$KERNEL_PATCHES_FOLDER/common/reduce_freeze_timeout.patch"; do
          patch -p1 --forward < "$patch" || true
        done

    - name: Add Nethunter Inline Configs
      shell: bash
      run: |
        cd "$COMMON_KERNEL_FOLDER"
        cat >> arch/arm64/configs/gki_defconfig <<-EOF
        	CONFIG_BT_HCIBTUSB=y
        	CONFIG_BT_HCIBTUSB_BCM=y
        	CONFIG_BT_HCIBTUSB_RTL=y
        	CONFIG_USB_AIRSPY=y
        	CONFIG_USB_HACKRF=y
        	CONFIG_CAN=y
        	CONFIG_CAN_DEV=y
        	CONFIG_CAN_VCAN=y
        	CONFIG_CAN_8DEV_USB=y
        	CONFIG_CAN_EMS_USB=y
        	CONFIG_CAN_GS_USB=y
        	CONFIG_CAN_PEAK_USB=y
        	CONFIG_NETLINK_DIAG=y
        	CONFIG_VSOCKETS=y
        	CONFIG_USB_SERIAL=y
        	CONFIG_USB_SERIAL_CONSOLE=y
        	CONFIG_USB_SERIAL_GENERIC=y
        	CONFIG_USB_SERIAL_CH341=y
        	CONFIG_USB_SERIAL_FTDI_SIO=y
        	CONFIG_USB_SERIAL_PL2303=y
        EOF

    - name: Add TTL Support
      shell: bash
      run: |
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_IP_NF_TARGET_TTL=y
        	CONFIG_IP6_NF_TARGET_HL=y
        	CONFIG_IP6_NF_MATCH_HL=y
        EOF

    - name: Add IP_SET & IPv6 NAT
      shell: bash
      run: |
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_IP_SET=y
        	CONFIG_IP_SET_MAX=65534
        	CONFIG_IP_SET_BITMAP_IP=y
        	CONFIG_IP_SET_BITMAP_IPMAC=y
        	CONFIG_IP_SET_BITMAP_PORT=y
        	CONFIG_IP_SET_HASH_IP=y
        	CONFIG_IP_SET_HASH_IPPORT=y
        	CONFIG_IP_SET_HASH_IPPORTIP=y
        	CONFIG_IP_SET_HASH_IPPORTNET=y
        	CONFIG_IP_SET_HASH_IPMAC=y
        	CONFIG_IP_SET_HASH_MAC=y
        	CONFIG_IP_SET_HASH_NET=y
        	CONFIG_IP_SET_HASH_NETPORT=y
        	CONFIG_IP_SET_HASH_NETIFACE=y
        	CONFIG_IP_SET_LIST_SET=y
        	CONFIG_IP6_NF_NAT=y
        	CONFIG_IP6_NF_TARGET_MASQUERADE=y
        EOF

    - name: Add BBR
      shell: bash
      run: |
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<-EOF
        	CONFIG_TCP_CONG_ADVANCED=y
        	CONFIG_TCP_CONG_BBR=y
        	CONFIG_NET_SCH_FQ=y
        	CONFIG_NET_SCH_FQ_CODEL=y
        EOF

    - name: Add Build Configs & MAC80211=m
      shell: bash
      run: |
        cd "$COMMON_KERNEL_FOLDER"
        cat >> arch/arm64/configs/gki_defconfig <<-EOF
        	CONFIG_LTO_CLANG_THIN=y
        	CONFIG_LTO_CLANG=y
        	CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        	CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n
        	CONFIG_OPTIMIZE_INLINING=y
        	CONFIG_FRAME_WARN=0
        	CONFIG_TRACEPOINTS=y
        EOF
        ./scripts/config --file arch/arm64/configs/gki_defconfig --module CONFIG_MAC80211

    - name: Save Build Metadata
      id: save_metadata
      shell: bash
      run: |
        cd "$ARTIFACTS_FOLDER"
        echo "kernel_version=$KERNEL_FULL_VER" >> "$GITHUB_OUTPUT"
        echo "ksu_version=$KSUVER" >> "$GITHUB_OUTPUT"
        echo "susfs_version=$SUSVER" >> "$GITHUB_OUTPUT"

    - name: Detect Clang
      shell: bash
      run: |
        for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base/clang/host/linux-x86/clang-r"* 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            break
          fi
        done
        [ -z "${CLANG_BIN:-}" ] && { echo "No clang found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

    - name: Build Kernel
      shell: bash
      run: |
        export LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu- LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
        export PATH="/usr/lib/ccache:${CLANG_BIN_PATH}:$PATH"
        export CC="ccache clang" HOSTCC="ccache clang" HOSTCXX="ccache clang++"
        cd "$COMMON_KERNEL_FOLDER"
        : > .scmversion
        OUT=out
        mkdir -p "$OUT"
        make O="$OUT" gki_defconfig
        ./scripts/config --file "$OUT/.config" --set-str LOCALVERSION "-${ANDROID_VER}-${{ inputs.kernel_uname }}"
        make O="$OUT" olddefconfig
        make -j$(nproc --all) O="$OUT" modules_prepare
        make -j$(nproc --all) O="$OUT" Image || { echo "Kernel build failed"; exit 1; }
    
    - name: Build Linux Headers .deb Package
      if: success()
      shell: bash
      run: |
        set -euo pipefail
        cd "$COMMON_KERNEL_FOLDER"
        OUT=out
        KERNELRELEASE=$(make O="$OUT" -s kernelrelease)
        HEADERS_DIR="$GITHUB_WORKSPACE/linux-headers-$KERNELRELEASE"
        rm -rf "$HEADERS_DIR"
        mkdir -p "$HEADERS_DIR/DEBIAN"
        mkdir -p "$HEADERS_DIR/usr/src/linux-headers-$KERNELRELEASE"
    
        # Install headers
        make O="$OUT" ARCH=arm64 headers_install INSTALL_HDR_PATH="$HEADERS_DIR/usr"
    
        # Copy .config and Module.symvers (if exists)
        cp "$OUT/.config" "$HEADERS_DIR/usr/src/linux-headers-$KERNELRELEASE/.config"
        if [ -f "$OUT/Module.symvers" ]; then
          cp "$OUT/Module.symvers" "$HEADERS_DIR/usr/src/linux-headers-$KERNELRELEASE/Module.symvers"
        else
          echo "::warning::Module.symvers not found; headers package will lack symbol version info"
        fi
    
        # Create control file
        cat > "$HEADERS_DIR/DEBIAN/control" <<-EOF
        Package: linux-headers-$KERNELRELEASE
        Version: $KERNELRELEASE
        Architecture: arm64
        Maintainer: $BUILD_USER <$BUILD_USER@$BUILD_HOST>
        Description: Linux kernel headers for $KERNELRELEASE
         This package provides kernel header files for version $KERNELRELEASE,
         useful for building external kernel modules like DKMS or manual compilations.
        EOF
    
        # Build .deb
        cd "$GITHUB_WORKSPACE"
        dpkg-deb --build "linux-headers-$KERNELRELEASE"
        mv "linux-headers-${KERNELRELEASE}.deb" "$ARTIFACTS_FOLDER/"
        echo "✅ Headers .deb created: $ARTIFACTS_FOLDER/linux-headers-${KERNELRELEASE}.deb"

    - name: Build Backports 6.1.97-1 (Full Wi-Fi driver set)
      shell: bash
      run: |
        set -euo pipefail
        RELEASE="${{ inputs.backports_release }}"
        URL="https://cdn.kernel.org/pub/linux/kernel/projects/backports/stable/v6.1.97/${RELEASE}.tar.xz"
        KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/common/out"
    
        if [ -n "${CLANG_BIN_PATH:-}" ] && [ -x "${CLANG_BIN_PATH}/clang" ]; then
          export PATH="${CLANG_BIN_PATH}:$PATH"
        fi
        export PATH="/usr/lib/ccache:$PATH"
    
        MAKE_FLAGS=(
          LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump
          DEPMOD=depmod DTC=dtc STRIP=llvm-strip
          HOSTCC=clang HOSTCXX=clang++ CC=clang
        )
    
        cd "$GITHUB_WORKSPACE"
        wget -q -O backports.tar.xz "$URL"
        tar -xf backports.tar.xz
        rm -rf backports-stable
        mv "$RELEASE" backports-stable
        cd backports-stable
    
        # Patch CFI macro
        FILE="backport-include/linux/module.h"
        sed -i 's/__CFI_ADDRESSABLE(init_module, __initdata)/__CFI_ADDRESSABLE(init_module)/g' "$FILE"
        sed -i 's/__CFI_ADDRESSABLE(cleanup_module, __exitdata)/__CFI_ADDRESSABLE(cleanup_module)/g' "$FILE"
    
