name: Build Nethunter-ready Kernel (repo-based)

permissions:
  contents: write
  actions: write

inputs:
  optimize_level:
    description: 'Compiler optimization level (O2 or O3)'
    required: false
    type: string
    default: O2
  kernel_uname:
    description: 'Custom kernel localversion string'
    required: false
    type: string
    default: "Nethunter"

runs:
  using: composite
  steps:
    - name: Setup Base Environment
      shell: bash
      run: |
        CONFIG="OP11R"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        [ -x "$REPO" ] || { curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO" && chmod +x "$REPO"; }
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source (repo)
      shell: bash
      run: |
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        "$REPO" init \
          --manifest-url https://github.com/docdry0001/kernel_patches.git \
          --manifest-branch main \
          -m kernel_manifest/oneplus_11r_b.xml \
          --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch \
             -j"$(nproc --all)" --fail-fast; then
            success=true; break
          fi
          sleep 20
        done
        $success || { echo "repo sync failed"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        ANDROID_VERSION="android12"
        cd "$GITHUB_WORKSPACE/$CONFIG/kernel_platform/common"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$FULL_VERSION" >> "$GITHUB_ENV"

    - name: Install Dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache
        sudo apt-get clean

    - name: Add Nethunter Inline Configs
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE/$CONFIG/kernel_platform/common"
        cat >> arch/arm64/configs/gki_defconfig <<-EOF
        	CONFIG_BT_HCIBTUSB=y
        	CONFIG_BT_HCIBTUSB_BCM=y
        	CONFIG_BT_HCIBTUSB_RTL=y
        	CONFIG_USB_AIRSPY=y
        	CONFIG_USB_HACKRF=y
        	CONFIG_CAN=y
        	CONFIG_CAN_DEV=y
        	CONFIG_CAN_VCAN=y
        	CONFIG_CAN_8DEV_USB=y
        	CONFIG_CAN_EMS_USB=y
        	CONFIG_CAN_GS_USB=y
        	CONFIG_CAN_PEAK_USB=y
        	CONFIG_NETLINK_DIAG=y
        	CONFIG_VSOCKETS=y
        	CONFIG_USB_SERIAL=y
        	CONFIG_USB_SERIAL_CONSOLE=y
        	CONFIG_USB_SERIAL_GENERIC=y
        	CONFIG_USB_SERIAL_CH341=y
        	CONFIG_USB_SERIAL_FTDI_SIO=y
        	CONFIG_USB_SERIAL_PL2303=y
        EOF

    - name: Detect Clang (prebuilts or system)
      shell: bash
      run: |
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_BIN=""
        for base in "$KERNEL_PLATFORM/prebuilts" "$KERNEL_PLATFORM/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base/clang/host/linux-x86/clang-r"* 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            break
          fi
        done
        if [ -z "$CLANG_BIN" ] && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
        fi
        [ -z "${CLANG_BIN:-}" ] && { echo "No clang found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

    - name: Build Kernel
      shell: bash
      run: |
        export LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu- LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export CC="ccache clang" HOSTCC="ccache clang" HOSTCXX="ccache clang++"
        cd "$GITHUB_WORKSPACE/$CONFIG/kernel_platform/common"
        : > .scmversion
        OUT=out
        mkdir -p "$OUT"
        make O="$OUT" gki_defconfig
        ./scripts/config --file "$OUT/.config" --set-str LOCALVERSION "-${ANDROID_VER}-${{ inputs.kernel_uname }}"
        make O="$OUT" olddefconfig
        make -j$(nproc --all) O="$OUT" Image || { echo "Kernel build failed"; exit 1; }

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kernel-nethunter-OP11R
        path: ${{ github.workspace }}/OP11R/kernel_platform/common/out/arch/arm64/boot/Image
