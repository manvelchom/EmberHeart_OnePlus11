          KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" \
          V=1 2>&1 | tee ../backports-build.log
    
        KO_COUNT=$(find . -name '*.ko' | wc -l)
        echo "Backports built .ko count: $KO_COUNT"
        [ "$KO_COUNT" -gt 0 ] || exit 1
    
        mkdir -p ../backports-artifacts
        find . -name '*.ko' -exec cp --parents {} ../backports-artifacts/ \;
        cp .config ../backports-artifacts/backports.config
        cp ../backports-build.log ../backports-artifacts/
        
    - name: Archive backports modules (flat)
      if: success()
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -d "$GITHUB_WORKSPACE/backports-artifacts" ]; then
          echo "Backports artifacts not found, skipping archive."
          exit 0
        fi
        mkdir -p /tmp/backports-flat
        find "$GITHUB_WORKSPACE/backports-artifacts" -name '*.ko' -exec cp {} /tmp/backports-flat/ \;
        cd /tmp/backports-flat
        zip -r "$ARTIFACTS_FOLDER/backports-all-modules.zip" .
        echo "Flat archive created: $ARTIFACTS_FOLDER/backports-all-modules.zip"
    - name: Create AnyKernel3 ZIP
      id: create_zip
      shell: bash
      run: |
        cp "$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image" "$AK3_FOLDER/"
        cp "$ARTIFACTS_FOLDER/${OP_MODEL}.txt" "$AK3_FOLDER/"
        cd "$AK3_FOLDER"
        ZIP_NAME="AK3_${OP_MODEL}_${KERNEL_FULL_VER}_KSUN_${KSUVER}_SuSFS_${SUSVER}.zip"
        zip -r "$ZIP_NAME" . -x "*.git*"
        mv "$ZIP_NAME" "$ARTIFACTS_FOLDER/"
        ZIP_SHA256=$(sha256sum "$ARTIFACTS_FOLDER/$ZIP_NAME" | awk '{print $1}')
        echo "zip_sha256=$ZIP_SHA256" >> "$GITHUB_OUTPUT"
        echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

    - name: Collect Build Stats
      id: collect_stats
      shell: bash
      run: |
        IMG="$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image"
        IMG_SHA256=$(sha256sum "$IMG" | awk '{print $1}')
        WARNINGS_COUNT=$(grep -ci warning "$COMMON_KERNEL_FOLDER/build.log" 2>/dev/null || echo 0)
        echo "image_sha256=$IMG_SHA256" >> "$GITHUB_OUTPUT"
        echo "warnings_count=$WARNINGS_COUNT" >> "$GITHUB_OUTPUT"

    - name: List artifacts folder
      if: always()
      shell: bash
      run: |
        echo "Contents of $ARTIFACTS_FOLDER:"
        ls -la "$ARTIFACTS_FOLDER"

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.CONFIG }}
        path: |
          ${{ env.ARTIFACTS_FOLDER }}/AK3_*.zip
          ${{ env.ARTIFACTS_FOLDER }}/backports-all-modules.zip
          ${{ env.ARTIFACTS_FOLDER }}/linux-headers-*.deb
