name: Build RTL88xx Wi-Fi Modules

on:
  workflow_dispatch:

jobs:
  build-modules:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      MODULES: rtl88xxau
      KERNEL_SRC: kernel_platform/msm-kernel
      CLANG_PATH: kernel_platform/prebuilts-master/clang/host/linux-x86/bin
      LLVM: 1

    steps:
      - name: Checkout full repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libelf-dev libncurses5-dev git dkms build-essential

      - name: Clone RTL88xx modules
        run: |
          git clone https://github.com/aircrack-ng/rtl8812au.git rtl88xxau

      - name: Prepare kernel source (generate .config + modules_prepare)
        run: |
          export PATH="$GITHUB_WORKSPACE/$CLANG_PATH:$PATH"
          cd $KERNEL_SRC
          make ARCH=$ARCH LLVM=$LLVM gki_defconfig
          make ARCH=$ARCH LLVM=$LLVM modules_prepare

      - name: Build external modules
        run: |
          export PATH="$GITHUB_WORKSPACE/$CLANG_PATH:$PATH"
          mkdir -p build_output

          for mod in $MODULES; do
            echo "Building $mod..."
            make -C $GITHUB_WORKSPACE/$KERNEL_SRC \
                 ARCH=$ARCH \
                 LLVM=$LLVM \
                 M=$GITHUB_WORKSPACE/$mod \
                 modules
            find $mod -name "*.ko" -exec cp {} build_output/ \;
          done

      - name: List built modules
        run: ls -l build_output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wifi-modules
          path: build_output/
